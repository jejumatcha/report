<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찰떡누수 서류 관리</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  background: #0B1830;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 20px 40px;
}

.logo-wrap {
  text-align: center;
  margin-bottom: 40px;
}
.logo-badge {
  display: inline-block;
  background: #C49A28;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 10px;
}
.logo-title {
  font-size: 32px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 2px;
}
.logo-title span { color: #C49A28; }
.logo-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  margin-top: 6px;
}
.divider {
  width: 40px;
  height: 2px;
  background: #C49A28;
  margin: 20px auto 0;
  border-radius: 2px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  width: 100%;
  max-width: 480px;
}

.card {
  display: block;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 24px 20px;
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  cursor: pointer;
}
.card:hover {
  background: rgba(196,154,40,0.12);
  border-color: rgba(196,154,40,0.5);
  transform: translateY(-2px);
}
.card-icon {
  font-size: 28px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.card-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  line-height: 1.6;
}
.card-arrow {
  margin-top: 16px;
  font-size: 11px;
  font-weight: 700;
  color: #C49A28;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-arrow::after {
  content: '→';
  display: inline-block;
  transition: transform 0.2s;
}
.card:hover .card-arrow::after { transform: translateX(4px); }

.footer {
  margin-top: 48px;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  text-align: center;
}
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo-badge">Documents</div>
  <div class="logo-title"><span>찰떡</span>누수</div>
  <div class="logo-sub">서류 관리 시스템</div>
  <div class="divider"></div>
</div>

<div class="cards">

  <a class="card" href="iphone.html">
    <div class="card-icon">📋</div>
    <div class="card-title">공사완료보고서</div>
    <div class="card-desc">누수 수리 완료 후<br>작성하는 공사 완료 확인서</div>
    <div class="card-arrow">열기</div>
  </a>

  <a class="card" href="water-bill-reduction.html">
    <div class="card-icon">💧</div>
    <div class="card-title">수도요금 감면 신청서</div>
    <div class="card-desc">옥내 누수사용료 적용<br>신청서 및 수리확인서</div>
    <div class="card-arrow">열기</div>
  </a>

  <a class="card" href="checklist.html">
    <div class="card-icon">✅</div>
    <div class="card-title">체크리스트</div>
    <div class="card-desc">현장 점검 및<br>작업 체크리스트</div>
    <div class="card-arrow">열기</div>
  </a>

  <a class="card" href="estimate.html">
    <div class="card-icon">📄</div>
    <div class="card-title">견적서</div>
    <div class="card-desc">누수 탐지 및 수리<br>견적서 작성</div>
    <div class="card-arrow">열기</div>
  </a>

</div>

<div class="footer">찰떡누수 &nbsp;·&nbsp; 1660-4350 &nbsp;·&nbsp; 제주특별자치도</div>

</body>
</html>
