<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찰떡누수 서류 허브</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --navy: #0B1830;
    --gold: #F4B942;
    --gold-light: #fdd47a;
    --white: #ffffff;
    --gray: #f4f4f4;
    --text-sub: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo-badge {
    display: inline-block;
    border: 2px solid var(--gold);
    padding: 6px 18px;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .logo-title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--white);
  }

  .logo-title span { color: var(--gold); }

  .logo-sub {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-sub);
    letter-spacing: 2px;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--gold);
    margin: 20px auto 0;
  }

  /* 카드 그리드 */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 800px;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 28px 24px;
    text-decoration: none;
    color: var(--white);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform 0.2s;
    transform-origin: bottom;
  }

  .card:hover {
    background: rgba(244,185,66,0.08);
    border-color: var(--gold);
    transform: translateY(-2px);
  }

  .card:hover::before { transform: scaleY(1); }

  .card-icon {
    font-size: 22px;
    margin-bottom: 2px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .card-desc {
    font-size: 11.5px;
    color: var(--text-sub);
    line-height: 1.6;
  }

  .card-arrow {
    margin-top: auto;
    padding-top: 14px;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-arrow::after {
    content: '→';
    transition: transform 0.2s;
  }

  .card:hover .card-arrow::after { transform: translateX(4px); }

  .footer {
    margin-top: 48px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo-badge">Documents</div>
  <div class="logo-title"><span>찰떡</span>누수</div>
  <div class="logo-sub">서류 관리 시스템</div>
  <div class="divider"></div>
</div>

<div class="cards">

  <a class="card" href="iphone.html">
    <div class="card-icon">📋</div>
    <div class="card-title">공사완료보고서</div>
    <div class="card-desc">누수 수리 완료 후<br>작성하는 공사 완료 확인서</div>
    <div class="card-arrow">열기</div>
  </a>

  <a class="card" href="water-bill-reduction">
    <div class="card-icon">💧</div>
    <div class="card-title">수도요금 감면 신청서</div>
    <div class="card-desc">옥내 누수사용료 적용<br>신청서 및 수리확인서</div>
    <div class="card-arrow">열기</div>
  </a>

  <a class="card" href="checklist">
    <div class="card-icon">✅</div>
    <div class="card-title">체크리스트</div>
    <div class="card-desc">현장 점검 및<br>작업 체크리스트</div>
    <div class="card-arrow">열기</div>
  </a>

</div>

<div class="footer">찰떡누수 &nbsp;·&nbsp; 1660-4350 &nbsp;·&nbsp; 제주특별자치도</div>

</body>
</html>
